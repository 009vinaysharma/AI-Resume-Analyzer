{% extends "base.html" %}
{% block title %}Login – ResumeAI{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">⟨⟩</span> ResumeAI</div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to access your resume analyses</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="text-input" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="text-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</section>
{% endblock %}
