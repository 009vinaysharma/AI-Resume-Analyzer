{% extends "base.html" %}
{% block title %}Register – ResumeAI{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">⟨⟩</span> ResumeAI</div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub">Start analyzing resumes for free</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="text-input" placeholder="johndoe" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="text-input" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="text-input" placeholder="min. 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</section>
{% endblock %}
